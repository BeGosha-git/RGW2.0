<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Layout Editor</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; font-family: sans-serif; background: #111; color: #f1f1f1; }
    #root { display: flex; width: 100%; height: 100%; }
    #stageWrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 16px;
    }
    #stage {
      width: 75vw; max-width: 75vw; height: 75vh; max-height: 75vh;
      background: linear-gradient(140deg, #151515, #2a2a2a);
      border: 1px solid #666; border-radius: 10px; position: relative; overflow: hidden;
    }
    #stage::before {
      content: ""; position: absolute; inset: 0; background:
      repeating-linear-gradient(90deg, rgba(255,255,255,.03), rgba(255,255,255,.03) 1px, transparent 1px, transparent 24px),
      repeating-linear-gradient(0deg, rgba(255,255,255,.03), rgba(255,255,255,.03) 1px, transparent 1px, transparent 24px);
      pointer-events: none;
    }
    #side {
      width: 340px; border-left: 1px solid #2d2d2d; background: #1a1a1a;
      padding: 10px; overflow: auto;
    }
    .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    select, input, button {
      background: #232323; color: #fff; border: 1px solid #555; border-radius: 8px; padding: 7px 9px;
    }
    button { cursor: pointer; }
    #cmdList { display: grid; gap: 8px; margin-top: 8px; }
    .cmd {
      border: 1px solid #505050; border-radius: 10px; background: rgba(255,255,255,0.03);
      padding: 8px; display: grid; gap: 6px;
    }
    .cmd h4 { margin: 0; font-size: 13px; }
    .note { font-size: 12px; color: #bbb; }
    .node {
      position: absolute; width: 66px; height: 66px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,.35); background: rgba(20,20,20,.45);
      display: flex; align-items: center; justify-content: center; text-align: center;
      font-size: 10px; padding: 4px; cursor: move;
      transform: translate(-50%, -50%);
    }
    #save { width: 100%; margin-top: 10px; padding: 10px; background: #146634; border-color: #2ca261; }
  </style>
</head>
<body>
  <div id="root">
    <div id="stageWrap"><div id="stage"></div></div>
    <aside id="side">
      <div class="row">
        <select id="layoutSelect" style="flex:1"></select>
        <button id="newLayout">+ раскладка</button>
      </div>
      <div class="row">
        <button id="prevLayout">предыдущая</button>
        <button id="nextLayout">следующая</button>
      </div>
      <div class="note">Нажми команду справа, затем кликни в рабочем поле для размещения кнопки.</div>
      <div id="cmdList"></div>
      <button id="save">Сохранить раскладки</button>
      <div id="msg" class="note" style="margin-top:8px;"></div>
    </aside>
  </div>
  <script>
    const state = {
      layouts: [],
      activeLayoutId: null,
      commands: [],
      robots: [],
      selectedCommandId: null,
      selectedRobotIp: "",
      drag: null,
    };

    const stage = document.getElementById("stage");
    const layoutSelect = document.getElementById("layoutSelect");
    const cmdList = document.getElementById("cmdList");
    const msg = document.getElementById("msg");
    function setMsg(t){ msg.textContent = t || ""; }
    function uid(){ return Math.random().toString(36).slice(2, 10); }
    function clamp(v,min,max){ return Math.min(max, Math.max(min, v)); }
    async function jget(url){
      const r = await fetch(url); const d = await r.json();
      if (!r.ok || d.success === false) throw new Error(d.message || ("HTTP " + r.status)); return d;
    }
    async function jpost(url, body){
      const r = await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body||{})});
      const d = await r.json();
      if (!r.ok || d.success === false) throw new Error(d.message || ("HTTP " + r.status)); return d;
    }
    function activeLayout(){
      return state.layouts.find(l=>l.id===state.activeLayoutId) || state.layouts[0] || null;
    }
    function renderLayoutSelect(){
      layoutSelect.innerHTML = "";
      for (const l of state.layouts){
        const o = document.createElement("option");
        o.value = l.id; o.textContent = l.name || l.id; layoutSelect.appendChild(o);
      }
      layoutSelect.value = state.activeLayoutId || "";
    }
    function renderStage(){
      stage.innerHTML = "";
      const l = activeLayout(); if (!l) return;
      for (const b of (l.buttons || [])){
        const n = document.createElement("div");
        n.className = "node";
        n.dataset.id = b.id;
        n.style.left = (b.x || 50) + "%";
        n.style.top = (b.y || 50) + "%";
        n.style.width = (b.size || 66) + "px";
        n.style.height = (b.size || 66) + "px";
        const cmd = state.commands.find(c => c.id === b.commandId);
        n.textContent = b.label || cmd?.name || b.commandId;
        n.title = (cmd?.description || "") + (b.robotIp ? (" | " + b.robotIp) : "");
        n.onpointerdown = (e) => {
          n.setPointerCapture(e.pointerId);
          state.drag = { id: b.id };
        };
        n.onpointermove = (e) => {
          if (!state.drag || state.drag.id !== b.id) return;
          const r = stage.getBoundingClientRect();
          const x = clamp(((e.clientX - r.left) / r.width) * 100, 0, 100);
          const y = clamp(((e.clientY - r.top) / r.height) * 100, 0, 100);
          b.x = +x.toFixed(2); b.y = +y.toFixed(2);
          n.style.left = b.x + "%"; n.style.top = b.y + "%";
        };
        n.onpointerup = () => { state.drag = null; };
        n.oncontextmenu = (e) => {
          e.preventDefault();
          if (confirm("Удалить кнопку?")) {
            l.buttons = l.buttons.filter(x => x.id !== b.id);
            renderStage();
          }
        };
        stage.appendChild(n);
      }
    }
    function renderCommands(){
      cmdList.innerHTML = "";
      for (const c of state.commands){
        const card = document.createElement("div");
        card.className = "cmd";
        const h = document.createElement("h4");
        h.textContent = c.name || c.id;
        const robotSel = document.createElement("select");
        const localOpt = document.createElement("option");
        localOpt.value = ""; localOpt.textContent = "Локальный робот";
        robotSel.appendChild(localOpt);
        for (const r of state.robots){
          const o = document.createElement("option");
          o.value = r.ip; o.textContent = r.ip;
          robotSel.appendChild(o);
        }
        const addBtn = document.createElement("button");
        addBtn.textContent = "Выбрать команду";
        addBtn.onclick = () => {
          state.selectedCommandId = c.id;
          state.selectedRobotIp = robotSel.value || "";
          setMsg("Выбрано: " + (c.name || c.id) + ". Кликни в рабочем поле для размещения.");
        };
        card.appendChild(h);
        card.appendChild(robotSel);
        card.appendChild(addBtn);
        cmdList.appendChild(card);
      }
    }
    function addButtonAt(clientX, clientY){
      const l = activeLayout(); if (!l || !state.selectedCommandId) return;
      const r = stage.getBoundingClientRect();
      const x = clamp(((clientX - r.left) / r.width) * 100, 0, 100);
      const y = clamp(((clientY - r.top) / r.height) * 100, 0, 100);
      const cmd = state.commands.find(c => c.id === state.selectedCommandId);
      l.buttons = l.buttons || [];
      l.buttons.push({
        id: uid(),
        commandId: state.selectedCommandId,
        robotIp: state.selectedRobotIp || "",
        x: +x.toFixed(2),
        y: +y.toFixed(2),
        size: 66,
        label: cmd?.name || state.selectedCommandId
      });
      renderStage();
    }
    function switchLayout(next){
      if (!state.layouts.length) return;
      const idx = state.layouts.findIndex(l => l.id === state.activeLayoutId);
      const n = next ? (idx + 1) % state.layouts.length : (idx - 1 + state.layouts.length) % state.layouts.length;
      state.activeLayoutId = state.layouts[n].id;
      renderLayoutSelect();
      renderStage();
    }
    async function boot(){
      try{
        const [layouts, meta] = await Promise.all([jget("/api/control/layouts"), jget("/api/control/meta")]);
        state.layouts = layouts.layouts || [];
        if (!state.layouts.length) state.layouts.push({ id: "default", name: "Default", buttons: [] });
        state.activeLayoutId = layouts.activeLayoutId || state.layouts[0].id;
        state.commands = meta.commands || [];
        state.robots = meta.robots || [];
        renderLayoutSelect();
        renderCommands();
        renderStage();
      }catch(e){ setMsg("Ошибка загрузки: " + e.message); }
    }
    layoutSelect.onchange = () => { state.activeLayoutId = layoutSelect.value; renderStage(); };
    document.getElementById("newLayout").onclick = () => {
      const name = prompt("Имя новой раскладки:", "Layout " + (state.layouts.length + 1));
      if (!name) return;
      const id = "layout_" + uid();
      state.layouts.push({ id, name, buttons: [] });
      state.activeLayoutId = id;
      renderLayoutSelect(); renderStage();
    };
    document.getElementById("prevLayout").onclick = () => switchLayout(false);
    document.getElementById("nextLayout").onclick = () => switchLayout(true);
    stage.onclick = (e) => addButtonAt(e.clientX, e.clientY);
    document.getElementById("save").onclick = async () => {
      try{
        await jpost("/api/control/layouts", { layouts: state.layouts, activeLayoutId: state.activeLayoutId });
        setMsg("Сохранено");
      }catch(e){ setMsg("Ошибка сохранения: " + e.message); }
    };
    boot();
  </script>
</body>
</html>
