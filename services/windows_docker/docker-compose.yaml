services:
  robot1:
    build:
      context: ../..
      dockerfile: services/windows_docker/Dockerfile
    container_name: rgw_robot1
    ports:
      - "5001:5000"  # API порт
      - "8081:80"    # Web порт
    environment:
      - ROBOT_ID=0001
      - ROBOT_TYPE=PC
      - ROBOT_GROUP=white
      - VERSION_PRIORITY=STABLE
    volumes:
      - ../../:/app
      - robot1_data:/app/data
    networks:
      - rgw_network
    command: sh -c "python init_settings.py && python -u main.py 2>&1"
    restart: unless-stopped

