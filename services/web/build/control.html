<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>RGW Control</title>
  <style>
    :root { --btn: 70px; --bg: #000; --fg: #fff; --warn: #ff9f1a; }
    * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--fg); font-family: sans-serif; }
    #app { position: fixed; inset: 0; background: #000; }
    #camera {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: contain; background: #000;
    }
    #overlay { position: absolute; inset: 0; pointer-events: none; }
    .ctrl-btn {
      position: absolute; width: var(--btn); height: var(--btn);
      border-radius: 999px; border: 1px solid rgba(255,255,255,0.35);
      background: rgba(20,20,20,0.44); color: #fff; backdrop-filter: blur(2px);
      display: flex; align-items: center; justify-content: center; text-align: center;
      font-size: 11px; line-height: 1.15; padding: 6px; pointer-events: auto; cursor: pointer;
    }
    .ctrl-btn:active { transform: scale(0.96); }
    #topbar {
      position: absolute; top: 10px; left: 10px; right: 10px;
      display: flex; justify-content: space-between; align-items: center; pointer-events: none;
    }
    #layoutNav { display: flex; gap: 6px; pointer-events: auto; }
    .nav-btn {
      border: 1px solid rgba(255,255,255,0.45); border-radius: 999px;
      padding: 8px 12px; background: rgba(0,0,0,0.35); color: #fff; font-size: 12px; cursor: pointer;
    }
    #warn {
      pointer-events: auto; min-width: 30px; height: 30px; border-radius: 999px;
      background: rgba(255,159,26,0.9); color: #131313; font-weight: bold;
      display: none; align-items: center; justify-content: center; font-size: 18px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.4);
    }
    #status {
      position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.35); padding: 6px 10px; border-radius: 999px;
      font-size: 12px; color: rgba(255,255,255,0.9); pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <img id="camera" alt="camera stream">
    <div id="overlay">
      <div id="topbar">
        <div id="layoutNav">
          <button class="nav-btn" id="prevLayout">Предыдущая</button>
          <button class="nav-btn" id="nextLayout">Следующая</button>
        </div>
        <div id="warn" title="Внимание: нет связи с одним или несколькими роботами">!</div>
      </div>
      <div id="buttons"></div>
      <div id="status"></div>
    </div>
  </div>
  <script>
    const state = {
      cameras: [],
      cameraIdx: 0,
      layouts: [],
      activeLayoutId: null,
      commandsMap: new Map(),
      discoveredIps: new Set(),
    };

    const cameraEl = document.getElementById("camera");
    const buttonsEl = document.getElementById("buttons");
    const statusEl = document.getElementById("status");
    const warnEl = document.getElementById("warn");

    function setStatus(text) { statusEl.textContent = text || ""; }
    function isLandscape() { return window.innerWidth > window.innerHeight; }

    async function jget(url) {
      const r = await fetch(url);
      const d = await r.json();
      if (!r.ok || d.success === false) throw new Error(d.message || ("HTTP " + r.status));
      return d;
    }
    async function jpost(url, body) {
      const r = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body || {}) });
      const d = await r.json();
      if (!r.ok || d.success === false) throw new Error(d.message || ("HTTP " + r.status));
      return d;
    }

    function getActiveLayout() {
      return state.layouts.find(l => l.id === state.activeLayoutId) || state.layouts[0] || null;
    }

    function applyCamera() {
      if (!state.cameras.length) {
        cameraEl.removeAttribute("src");
        setStatus("Камеры не найдены");
        return;
      }
      const cam = state.cameras[state.cameraIdx];
      cameraEl.src = "/api/cameras/" + encodeURIComponent(cam.id) + "/mjpeg?t=" + Date.now();
      setStatus((cam.name || cam.id) + " | " + (getActiveLayout()?.name || "layout"));
    }

    function switchCamera(next = true) {
      if (state.cameras.length < 2) return;
      state.cameraIdx = next
        ? (state.cameraIdx + 1) % state.cameras.length
        : (state.cameraIdx - 1 + state.cameras.length) % state.cameras.length;
      applyCamera();
    }

    async function refreshWarning() {
      const layout = getActiveLayout();
      if (!layout) { warnEl.style.display = "none"; return; }
      try {
        const data = await jget("/api/control/layout_warnings?layoutId=" + encodeURIComponent(layout.id));
        warnEl.style.display = (data.missingRobots && data.missingRobots.length) ? "flex" : "none";
      } catch {
        warnEl.style.display = "none";
      }
    }

    function renderButtons() {
      buttonsEl.innerHTML = "";
      const layout = getActiveLayout();
      if (!layout) return;
      for (const btn of (layout.buttons || [])) {
        const cmd = state.commandsMap.get(btn.commandId);
        const b = document.createElement("button");
        b.className = "ctrl-btn";
        b.style.left = (btn.x || 50) + "%";
        b.style.top = (btn.y || 50) + "%";
        b.style.transform = "translate(-50%, -50%)";
        b.style.width = (btn.size || 70) + "px";
        b.style.height = (btn.size || 70) + "px";
        b.textContent = btn.label || (cmd ? cmd.name : btn.commandId);
        b.title = (cmd?.description || "") + (btn.robotIp ? (" | " + btn.robotIp) : "");
        b.onclick = async () => {
          b.disabled = true;
          try {
            setStatus("Выполняю: " + (cmd?.name || btn.commandId));
            await jpost("/api/control/execute", { commandId: btn.commandId, robotIp: btn.robotIp || "" });
            setStatus("OK: " + (cmd?.name || btn.commandId));
          } catch (e) {
            setStatus("Ошибка: " + e.message);
          } finally {
            setTimeout(() => { b.disabled = false; }, 250);
          }
        };
        buttonsEl.appendChild(b);
      }
    }

    function switchLayout(next = true) {
      if (!state.layouts.length) return;
      const idx = state.layouts.findIndex(l => l.id === state.activeLayoutId);
      const nextIdx = next
        ? (idx + 1) % state.layouts.length
        : (idx - 1 + state.layouts.length) % state.layouts.length;
      state.activeLayoutId = state.layouts[nextIdx].id;
      renderButtons();
      refreshWarning();
      applyCamera();
    }

    async function boot() {
      try {
        const [cams, layouts, meta] = await Promise.all([
          jget("/api/cameras/list"),
          jget("/api/control/layouts"),
          jget("/api/control/meta"),
        ]);
        state.cameras = cams.cameras || [];
        state.layouts = layouts.layouts || [];
        state.activeLayoutId = layouts.activeLayoutId || state.layouts[0]?.id || null;
        for (const c of (meta.commands || [])) state.commandsMap.set(c.id, c);
        for (const r of (meta.robots || [])) if (r.ip) state.discoveredIps.add(r.ip);
        applyCamera();
        renderButtons();
        refreshWarning();
      } catch (e) {
        setStatus("Ошибка загрузки: " + e.message);
      }
    }

    document.getElementById("nextLayout").onclick = () => switchLayout(true);
    document.getElementById("prevLayout").onclick = () => switchLayout(false);

    // Свайп камер: только старт в правой половине экрана, в landscape
    let touchStartX = null;
    let touchStartY = null;
    window.addEventListener("touchstart", (e) => {
      if (!isLandscape()) return;
      const t = e.changedTouches[0];
      if (t.clientX < window.innerWidth / 2) return;
      touchStartX = t.clientX;
      touchStartY = t.clientY;
    }, { passive: true });
    window.addEventListener("touchend", (e) => {
      if (touchStartX == null || touchStartY == null || !isLandscape()) return;
      const t = e.changedTouches[0];
      const dx = t.clientX - touchStartX;
      const dy = t.clientY - touchStartY;
      if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy) * 1.2) {
        if (dx < 0) switchCamera(true);    // справа -> влево
        if (dx > 0) switchCamera(false);   // слева <- справа
      }
      touchStartX = null;
      touchStartY = null;
    }, { passive: true });

    window.addEventListener("resize", () => applyCamera());
    boot();
  </script>
</body>
</html>
